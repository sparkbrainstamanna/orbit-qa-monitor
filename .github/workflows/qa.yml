name: Orbit QA Monitor

on:
  schedule:
    - cron: '30 3 * * *'  # runs daily at 9am IST
  workflow_dispatch:  # allows manual trigger too

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Run QA tests
        env:
          ORBIT_USERNAME: ${{ secrets.ORBIT_USERNAME }}
          ORBIT_PASSWORD: ${{ secrets.ORBIT_PASSWORD }}
        run: node tests/orbit.test.js
