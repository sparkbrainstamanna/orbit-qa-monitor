name: Orbit QA Monitor

on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Run QA tests
        env:
          ORBIT_USERNAME: ${{ secrets.ORBIT_USERNAME }}
          ORBIT_PASSWORD: ${{ secrets.ORBIT_PASSWORD }}
        run: node tests/orbit.test.js

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: 'new-channel'
          slack-message: "Orbit QA Report - All tests passed successfully today. Login, feed and buttons all working fine."
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          channel-id: 'new-channel'
          slack-message: "ALERT - Orbit QA tests failed today. Please check GitHub Actions for details."
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
